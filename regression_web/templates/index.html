<!DOCTYPE html>
<html>
<head>
    <title>Linear Regression</title>
</head>

<body>

<center>

<h2>Linear Regression</h2>

<form method="POST">

<label>Enter X Values</label><br><br>

<input
type="text"
name="x"
value="{{ x }}"
placeholder="1,2,3,4"
required>

<br><br>

<label>Enter Y Values</label><br><br>

<input
type="text"
name="y"
value="{{ y }}"
placeholder="2,4,6,8"
required>

<br><br>

<button
type="submit"
name="action"
value="submit">
Submit
</button>

&nbsp;&nbsp;

<button
type="submit"
name="action"
value="visualize">
Visualize
</button>

&nbsp;&nbsp;

<button
type="button"
onclick="window.location='/'">
Reset
</button>

</form>

<br>

{% if equation %}

<h3>{{ equation }}</h3>

<h3>Model Metrics</h3>

<p><b>MSE:</b> {{ mse }}</p>

<p><b>MAE:</b> {{ mae }}</p>

<p><b>RMSE:</b> {{ rmse }}</p>

<p><b>R² Score:</b> {{ r2 }}</p>

{% endif %}

<br>

{% if graph %}

<img
src="{{ url_for('static', filename='graph.png') }}"
width="700">

{% endif %}

</center>

</body>
</html>
